services:
  db:
    image: postgres:16-alpine
    container_name: fullstack_tasks_db
    environment:
      POSTGRES_DB: tasks_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d tasks_db']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build: ./parte2/api
    container_name: fullstack_tasks_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/tasks_db
      JWT_SECRET: super-secret-change-me
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - '8000:8000'
    restart: on-failure
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:8000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  front-end:
    build: ./parte2/front-end
    container_name: fullstack_tasks_frontend
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - '3000:3000'

volumes:
  postgres_data:
